name: Tests

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    if: ${{ !contains(github.event.head_commit.message, '[ci skip]') && !contains(github.event.head_commit.message, '[skip ci]') }}
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.14" ]
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - uses: actions/checkout@v6

      - name: Install poetry
        run: pipx install poetry==${{ vars.POETRY_VERSION }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'poetry'

      - name: Activate environment and install dependencies
        run: |
          poetry env use ${{ matrix.python-version }}
          poetry install

      - name: Check with Ruff
        run: |
          # Fails if Ruff format is not respected
          poetry run ruff format --check .
        shell: bash

      - name: Unit tests
      # Runners that won't send coverage report are run without coverage overhead
        if: ${{ runner.os != 'Linux' || matrix.python-version != '3.10' }}
        run: |
          poetry run pytest src
        shell: bash

      - name: Unit tests with coverage
        # Only for runner that will send coverage reports (see below)
        if: ${{ runner.os == 'Linux' && matrix.python-version == '3.10' }}
        run: |
          poetry run pytest src --cov
          poetry run coverage xml  # for sending coverage report
        shell: bash

      - name: Publish code coverage on Codecov
        uses: codecov/codecov-action@v5
        if: ${{ runner.os == 'Linux' && matrix.python-version == '3.10' }}
        with:
          #          flags: unittests  # optional
          name: codecov-FAST-OAD-RTA  # optional
          fail_ci_if_error: false  # optional (default = false)
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV }}

      - name: Integration tests
        run: poetry run pytest --no-cov tests
        shell: bash